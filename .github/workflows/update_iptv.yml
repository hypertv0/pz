name: Otomatik Yayın Güncelleyici

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Gerekli Paketleri Kur
        run: pip install curl_cffi
      - name: Botu Çalıştır
        run: python main.py
      - name: Dosyaları Kaydet
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add kanallar/* playlist.m3u
          git commit -m "PapazSports Otomatik Guncelleme" || echo "Degisiklik yok"
          git push
