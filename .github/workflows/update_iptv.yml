name: Otomatik Yayın Güncelleyici

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Kurulum
        run: |
          pip install playwright
          playwright install chromium
      - name: Calistir
        run: python main.py
      - name: Push
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add kanallar/* playlist.m3u
          git commit -m "PapazSports Guncelleme" || echo "No changes"
          git push
