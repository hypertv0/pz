name: Otomatik Yayın Güncelleyici

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Gerekli Paketleri ve Sanal Monitörü Kur
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          playwright install chromium
          sudo apt-get update
          sudo apt-get install -y xvfb
          
      - name: Botu Çalıştır (Sanal Ekran Modunda)
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" python main.py
        
      - name: Dosyaları GitHub'a Yükle
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add kanallar/* playlist.m3u
          git commit -m "PapazSports Otomatik Guncelleme" || echo "Degisiklik yok"
          git push
